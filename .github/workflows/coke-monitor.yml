name: Coca-Cola stock monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      send_test_email:
        description: "Enviar un correo de prueba"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  issues: write

concurrency:
  group: coca-cola-stock-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run monitor
        env:
          ALERT_EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          ALERT_FALLBACK_ISSUE: "true"
          GITHUB_TOKEN: ${{ github.token }}
          SEND_TEST_EMAIL: ${{ inputs.send_test_email || 'false' }}
          SMTP_HOST: "smtp.gmail.com"
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_PORT: "465"
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          TARGET_URL: "https://andina.micoca-cola.cl/laminas-coleccionables-mundial-fifa-2026"
          SEARCH_TERMS: "sobres mundial,láminas mundial,laminas mundial,sobres coca cola,láminas coca cola,set laminas,pack fifa mundial,pack laminas"
          PAGE_URLS: "https://andina.micoca-cola.cl/laminas-coleccionables-mundial-fifa-2026,https://andina.micoca-cola.cl/mundial-2026,https://andina.micoca-cola.cl/mundial-fifa-2026,https://andina.micoca-cola.cl/sobres%20mundial?map=ft&_q=sobres%20mundial,https://andina.micoca-cola.cl/l%C3%A1minas%20mundial?map=ft&_q=l%C3%A1minas%20mundial"
        run: python scripts/coke_monitor.py

      - name: Commit monitor state
        if: always()
        run: |
          if [ -n "$(git status --porcelain .monitor/state.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .monitor/state.json
            git commit -m "Update Coca-Cola monitor state" || true
            git push
          fi
